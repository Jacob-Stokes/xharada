version: '3.8'

services:
  xharada:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/harada.db
      - NODE_ENV=production
      - PORT=3001
      - SESSION_SECRET=change-me-to-something-secure
    restart: unless-stopped
